name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: open_pincery
          POSTGRES_PASSWORD: open_pincery
          POSTGRES_DB: open_pincery_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://open_pincery:open_pincery@localhost:5432/open_pincery_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The real-bwrap tests are skipped here via env gate (see below)
      # and run in the sandbox-smoke job's privileged container instead.
      # This job stays unprivileged so postgres/sqlx and socket tests
      # match the real devshell posture.
      - run: cargo test --all -- --test-threads=1
        env:
          OPEN_PINCERY_SKIP_REAL_BWRAP: "1"

  # Dedicated gate for AC-53 RealSandbox evidence.
  #
  # Runs inside a `--privileged` Docker container because hosted
  # GitHub runners block bwrap's MS_SLAVE|MS_REC on the inherited
  # root mount even for root callers (the mounts are locked with
  # respect to the init user namespace's ability to change
  # propagation on a shared-propagation systemd-managed /).
  # Workarounds attempted and rejected:
  #   - `mount --make-rprivate /` on host:  locked mounts unaffected.
  #   - `setcap cap_sys_admin+ep bwrap`:   modern bwrap refuses.
  #   - `sudo -E <test-binary>`:            still hits the locked-mount
  #                                         check; userns-propagation
  #                                         rules key on mount owner.
  #
  # A privileged container lifts AppArmor + seccomp restrictions and
  # runs its own mount namespace from first principles, so bwrap's
  # internal MS_SLAVE on / succeeds. This is the same posture the
  # local devshell uses (`docker run --privileged --cgroupns=host`).
  # The sandboxed child still unshares into an unprivileged userns
  # for every tool invocation — isolation posture is unchanged.
  sandbox-smoke:
    name: sandbox real-bwrap smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run AC-53 sandbox tests in privileged container
        run: |
          set -euo pipefail
          # Use a minimal Ubuntu 24.04 image and install the exact
          # userland the devshell uses. This is the shortest path to
          # a working bwrap on a hosted GitHub runner. If test timings
          # become a concern we can pre-publish ghcr.io/open-pincery/devshell.
          OUT=$(mktemp)
          docker run --rm --privileged --cgroupns=host \
            -v "$PWD:/work" -w /work \
            -e CARGO_HOME=/tmp/cargo \
            -e CARGO_TERM_COLOR=always \
            -e RUSTFLAGS="-D warnings" \
            ubuntu:24.04 \
            bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                bubblewrap slirp4netns uidmap libseccomp-dev libseccomp2 \
                pkg-config build-essential ca-certificates curl git libssl-dev libpq-dev
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain 1.88.0 --profile minimal
              export PATH=/tmp/cargo/bin:$PATH
              export OPEN_PINCERY_RUN_AC84_POSITIVE=1
              bwrap --version
              # Sanity-check: bwrap actually creates a user+pid ns.
              bwrap --unshare-user --unshare-pid --dev-bind / / /bin/true
              # Run every real-bwrap suite as a single cargo invocation
              # so target/ is shared. --test-threads=1 matches production
              # because tempdirs + procfs probes are not thread-safe.
              cargo test --test sandbox_real_smoke --test sandbox_landlock_test \
                         --test sandbox_uid_drop_test \
                         --test sandbox_seccomp_test --test sandbox_cgroup_test \
                         --test sandbox_preflight_test \
                         --no-fail-fast \
                         -- --nocapture --test-threads=1
            ' | tee "$OUT"
          # Fail if the suite ran zero tests -- would mean the
          # bwrap probe or Linux gate silently skipped our evidence.
          if grep -qE '^test result:.*0 passed' "$OUT" && ! grep -qE '^test result:.*[1-9][0-9]* passed' "$OUT"; then
            echo "::error::sandbox smoke produced 0 passed tests -- evidence gate failed" >&2
            exit 1
          fi

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
