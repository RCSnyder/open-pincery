name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: open_pincery
          POSTGRES_PASSWORD: open_pincery
          POSTGRES_DB: open_pincery_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://open_pincery:open_pincery@localhost:5432/open_pincery_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # AC-53 / AC-72 userland: installing here so the full suite's
      # Linux-gated sandbox tests (`tests/sandbox_real_smoke.rs`) do not
      # self-skip and silently fail to produce evidence.
      - name: install sandbox userland (bubblewrap, slirp4netns, uidmap)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap slirp4netns uidmap
          bwrap --version
      # Ubuntu 24.04 ships with
      # kernel.apparmor_restrict_unprivileged_userns=1, which blocks
      # bwrap's `--unshare-user` for non-root callers. Production
      # devshell sidesteps this by running the container as root with
      # `--privileged`; on bare CI runners we flip the sysctl off so
      # the sandbox tests can exercise real namespace isolation.
      # This is safe on an ephemeral hosted runner.
      #
      # We also have to change `/` to MS_PRIVATE propagation on the
      # host. Hosted runners inherit systemd's default shared mount
      # propagation, and an unprivileged user namespace cannot alter
      # mount propagation on LOCKED mounts inherited from the host.
      # Bwrap's internal `mount("none", "/", NULL, MS_SLAVE|MS_REC, NULL)`
      # then fails with EPERM ("Failed to make / slave"). Making /
      # private on the host means bwrap's child ns inherits it as
      # private, and the MS_SLAVE flip becomes a no-op that succeeds.
      # This only affects the ephemeral runner, not our sandbox posture.
      #
      # Additionally we grant bwrap CAP_SYS_ADMIN + CAP_SYS_CHROOT file
      # capabilities. This matches the legacy setuid-bwrap behavior
      # that Debian/Ubuntu dropped in favor of unprivileged userns;
      # on hosted runners the inherited mounts are LOCKED, meaning a
      # child user-ns cannot change propagation on them even if the
      # host root is already private. Granting file caps lets bwrap
      # perform the mount-propagation flip at exec time without being
      # setuid. Scope is limited to the ephemeral runner.
      - name: allow unprivileged user namespaces (AppArmor workaround)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo mount --make-rprivate /
          sudo setcap cap_sys_admin,cap_sys_chroot+ep "$(command -v bwrap)"
          # Sanity-check: bwrap actually creates a user+pid ns on this runner.
          bwrap --unshare-user --unshare-pid --dev-bind / / /bin/true
      - run: cargo test --all -- --test-threads=1

  # Dedicated gate for AC-53 RealSandbox evidence.  The smoke suite
  # self-skips if `bwrap` is absent; this job fails loudly if it ever
  # produces "0 passed" so regressions in the environment are visible.
  sandbox-smoke:
    name: sandbox real-bwrap smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install sandbox userland (bubblewrap, slirp4netns, uidmap)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap slirp4netns uidmap
          bwrap --version
      - name: allow unprivileged user namespaces (AppArmor workaround)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo mount --make-rprivate /
          sudo setcap cap_sys_admin,cap_sys_chroot+ep "$(command -v bwrap)"
          bwrap --unshare-user --unshare-pid --dev-bind / / /bin/true
      - name: cargo test --test sandbox_real_smoke (verbose, fail-on-skip)
        run: |
          set -euo pipefail
          OUT=$(mktemp)
          cargo test --test sandbox_real_smoke -- --nocapture --test-threads=1 \
            | tee "$OUT"
          # Fail if the suite ran zero tests -- that would mean the
          # Linux gate or bwrap probe silently disabled our evidence.
          if grep -qE '^test result:.*0 passed' "$OUT"; then
            echo "::error::sandbox_real_smoke produced 0 passed tests -- evidence gate failed" >&2
            exit 1
          fi

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
