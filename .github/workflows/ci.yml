name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: open_pincery
          POSTGRES_PASSWORD: open_pincery
          POSTGRES_DB: open_pincery_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://open_pincery:open_pincery@localhost:5432/open_pincery_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # AC-53 / AC-72 userland: installing here so the full suite's
      # Linux-gated sandbox tests (`tests/sandbox_real_smoke.rs`) do not
      # self-skip and silently fail to produce evidence.
      - name: install sandbox userland (bubblewrap, slirp4netns, uidmap)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap slirp4netns uidmap
          bwrap --version
      # Ubuntu 24.04 ships with
      # kernel.apparmor_restrict_unprivileged_userns=1, which blocks
      # bwrap's `--unshare-user` for non-root callers. Production
      # devshell sidesteps this by running the container as root with
      # `--privileged`; on bare CI runners we flip the sysctl off so
      # the sandbox tests can exercise real namespace isolation.
      # This is safe on an ephemeral hosted runner.
      #
      # Inherited mounts from systemd on hosted runners are LOCKED
      # under an unprivileged user-ns: bwrap's internal
      # `mount("none", "/", NULL, MS_SLAVE|MS_REC, NULL)` returns
      # EPERM ("Failed to make / slave"). Workarounds tried:
      #   - `mount --make-rprivate /` on host:      insufficient,
      #     locked-mount check is on the ownership of the mount.
      #   - `setcap cap_sys_admin+ep bwrap`:       modern bwrap
      #     refuses ("Unexpected capabilities but not setuid").
      # What actually works: invoke bwrap from a caller that has
      # CAP_SYS_ADMIN in the init user namespace (i.e. root). Inside
      # the init userns, locked-mount propagation rules don't apply,
      # and bwrap's `--unshare-user` still creates an unprivileged
      # child userns exactly as the non-CI path does. This affects
      # ONLY where bwrap is launched from, never the isolation
      # posture of the sandboxed process.
      - name: allow unprivileged user namespaces (AppArmor workaround)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          # Sanity-check: bwrap actually creates a user+pid ns on this runner.
          bwrap --unshare-user --unshare-pid --dev-bind / / /bin/true
      # `cargo test --all` stays unprivileged so postgres/sqlx and
      # socket tests behave like the real devshell. The dedicated
      # sandbox-smoke job below owns AC-53 evidence and runs the
      # smoke binary under sudo. We skip sandbox_real_smoke here via
      # env gate so the unprivileged runner doesn't fail on the
      # locked-mount issue the other job is designed to work around.
      - run: cargo test --all -- --test-threads=1 --skip real_sandbox_

  # Dedicated gate for AC-53 RealSandbox evidence.  The smoke suite
  # self-skips if `bwrap` is absent; this job fails loudly if it ever
  # produces "0 passed" so regressions in the environment are visible.
  sandbox-smoke:
    name: sandbox real-bwrap smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install sandbox userland (bubblewrap, slirp4netns, uidmap)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bubblewrap slirp4netns uidmap
          bwrap --version
      - name: allow unprivileged user namespaces (AppArmor workaround)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          bwrap --unshare-user --unshare-pid --dev-bind / / /bin/true
      - name: cargo test --test sandbox_real_smoke (verbose, fail-on-skip)
        run: |
          set -euo pipefail
          OUT=$(mktemp)
          # Build the test binary first (unprivileged — cargo + rust-cache
          # own the target dir).
          cargo test --no-run --test sandbox_real_smoke
          # Locate the compiled test binary.
          TEST_BIN=$(find target/debug/deps -maxdepth 1 -type f -name 'sandbox_real_smoke-*' -executable | head -1)
          if [ -z "$TEST_BIN" ]; then
            echo "::error::could not locate compiled sandbox_real_smoke test binary" >&2
            exit 1
          fi
          # Run as root so bwrap inherits CAP_SYS_ADMIN in the init
          # user namespace. Required to bypass the locked-inherited-mount
          # propagation check on hosted runners (see comments in the
          # `test` job). Bwrap still unshares into an unprivileged
          # child userns for the actual sandboxed command — isolation
          # posture is unchanged.
          sudo -E "$TEST_BIN" --nocapture --test-threads=1 | tee "$OUT"
          # Fail if the suite ran zero tests -- that would mean the
          # Linux gate or bwrap probe silently disabled our evidence.
          if grep -qE '^test result:.*0 passed' "$OUT"; then
            echo "::error::sandbox_real_smoke produced 0 passed tests -- evidence gate failed" >&2
            exit 1
          fi

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
