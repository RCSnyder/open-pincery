# AC-20: Signed release artifacts with SBOM.
#
# Triggered on any tag matching `v*`. Builds release binaries for Linux x86_64,
# generates a CycloneDX SBOM, signs each artifact with cosign keyless
# (GitHub OIDC), and publishes binaries + SHA-256 checksums + cosign
# signatures + certificates + SBOM to the GitHub Release for that tag.
#
# Verification by a downstream consumer:
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github\.com/.+/open-pincery/\.github/workflows/release\.yml@refs/tags/v.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --signature open-pincery-vX.Y.Z-linux-x86_64.sig \
#     --certificate open-pincery-vX.Y.Z-linux-x86_64.pem \
#     open-pincery-vX.Y.Z-linux-x86_64

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # publish release assets
  id-token: write # cosign keyless via GitHub OIDC

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build-${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Server + CLI for Linux servers (primary deploy target).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            binaries: open-pincery pcy
            ext: ""
          # CLI-only builds so remote clients can use pcy against a hosted
          # server. The server is always deployed on Linux (docker compose),
          # so open-pincery is not cross-compiled here.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64
            binaries: pcy
            ext: ""
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
            binaries: pcy
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
            binaries: pcy
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            binaries: pcy
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linux cross toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.suffix }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          BINS=""
          for B in ${{ matrix.binaries }}; do
            BINS="$BINS --bin $B"
          done
          cargo build --release --target ${{ matrix.target }} --locked $BINS

      - name: Stage artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SUFFIX="${{ matrix.suffix }}"
          EXT="${{ matrix.ext }}"
          mkdir -p dist
          for SRC_BIN in ${{ matrix.binaries }}; do
            OUT_NAME="${SRC_BIN}-${TAG}-${SUFFIX}${EXT}"
            cp "target/${{ matrix.target }}/release/${SRC_BIN}${EXT}" "dist/${OUT_NAME}"
            (cd dist && shasum -a 256 "${OUT_NAME}" > "${OUT_NAME}.sha256")
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries (keyless)
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd dist
          TAG="${GITHUB_REF_NAME}"
          SUFFIX="${{ matrix.suffix }}"
          EXT="${{ matrix.ext }}"
          for SRC_BIN in ${{ matrix.binaries }}; do
            BIN="${SRC_BIN}-${TAG}-${SUFFIX}${EXT}"
            cosign sign-blob \
              --output-signature "${BIN}.sig" \
              --output-certificate "${BIN}.pem" \
              "${BIN}"
          done

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            dist/*-${{ github.ref_name }}-${{ matrix.suffix }}*
          if-no-files-found: error
          retention-days: 7
          if-no-files-found: error
          retention-days: 7

  sbom:
    name: generate-sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: sbom

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7

      - name: Generate SBOM
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT="open-pincery-${TAG}-sbom.cdx.json"
          # cargo-cyclonedx writes to a crate-default filename which varies by
          # version; locate the produced .cdx.json and rename it.
          cargo cyclonedx --format json
          SRC=$(find . -maxdepth 3 -name '*.cdx.json' -not -path './dist/*' | head -n1)
          if [ -z "$SRC" ]; then
            echo "No .cdx.json produced by cargo-cyclonedx" >&2
            exit 1
          fi
          mkdir -p dist
          cp "$SRC" "dist/${OUT}"
          (cd dist && sha256sum "${OUT}" > "${OUT}.sha256")

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd dist
          SBOM="open-pincery-${GITHUB_REF_NAME}-sbom.cdx.json"
          cosign sign-blob \
            --output-signature "${SBOM}.sig" \
            --output-certificate "${SBOM}.pem" \
            "${SBOM}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dist/open-pincery-${{ github.ref_name }}-sbom.cdx.json*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish-release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
