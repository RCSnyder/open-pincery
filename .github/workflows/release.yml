# AC-20: Signed release artifacts with SBOM.
#
# Triggered on any tag matching `v*`. Builds release binaries for Linux x86_64
# and aarch64, generates a CycloneDX SBOM, signs each artifact with cosign
# keyless (GitHub OIDC), and publishes binaries + SHA-256 checksums + cosign
# signatures + certificates + SBOM to the GitHub Release for that tag.
#
# Verification by a downstream consumer:
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github\.com/.+/open-pincery/\.github/workflows/release\.yml@refs/tags/v.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --signature open-pincery-vX.Y.Z-linux-x86_64.sig \
#     --certificate open-pincery-vX.Y.Z-linux-x86_64.pem \
#     open-pincery-vX.Y.Z-linux-x86_64

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # publish release assets
  id-token: write # cosign keyless via GitHub OIDC

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Stage artifact
        id: stage
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BIN_NAME="open-pincery-${TAG}-${{ matrix.suffix }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/open-pincery" "dist/${BIN_NAME}"
          (cd dist && sha256sum "${BIN_NAME}" > "${BIN_NAME}.sha256")
          echo "bin_name=${BIN_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binary (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd dist
          BIN="${{ steps.stage.outputs.bin_name }}"
          cosign sign-blob \
            --output-signature "${BIN}.sig" \
            --output-certificate "${BIN}.pem" \
            "${BIN}"

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            dist/${{ steps.stage.outputs.bin_name }}
            dist/${{ steps.stage.outputs.bin_name }}.sha256
            dist/${{ steps.stage.outputs.bin_name }}.sig
            dist/${{ steps.stage.outputs.bin_name }}.pem
          if-no-files-found: error
          retention-days: 7

  sbom:
    name: generate-sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: sbom

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7

      - name: Generate SBOM
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          cargo cyclonedx --format json --override-filename "open-pincery-${TAG}-sbom"
          mkdir -p dist
          mv open-pincery-${TAG}-sbom.cdx.json "dist/open-pincery-${TAG}-sbom.cdx.json"
          (cd dist && sha256sum "open-pincery-${TAG}-sbom.cdx.json" > "open-pincery-${TAG}-sbom.cdx.json.sha256")

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd dist
          SBOM="open-pincery-${GITHUB_REF_NAME}-sbom.cdx.json"
          cosign sign-blob \
            --output-signature "${SBOM}.sig" \
            --output-certificate "${SBOM}.pem" \
            "${SBOM}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dist/open-pincery-${{ github.ref_name }}-sbom.cdx.json*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish-release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
