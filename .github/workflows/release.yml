# AC-20: Signed release artifacts with SBOM.
#
# Triggered on any tag matching `v*`. Builds release binaries for Linux x86_64,
# generates a CycloneDX SBOM, signs each artifact with cosign keyless
# (GitHub OIDC), and publishes binaries + SHA-256 checksums + cosign
# signatures + certificates + SBOM to the GitHub Release for that tag.
#
# Verification by a downstream consumer:
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github\.com/.+/open-pincery/\.github/workflows/release\.yml@refs/tags/v.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --signature open-pincery-vX.Y.Z-linux-x86_64.sig \
#     --certificate open-pincery-vX.Y.Z-linux-x86_64.pem \
#     open-pincery-vX.Y.Z-linux-x86_64

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # publish release assets
  id-token: write # cosign keyless via GitHub OIDC

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries (server + CLI)
        run: |
          cargo build --release --target ${{ matrix.target }} --locked \
            --bin open-pincery --bin pcy

      - name: Stage artifacts
        id: stage
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SUFFIX="${{ matrix.suffix }}"
          mkdir -p dist
          for SRC_BIN in open-pincery pcy; do
            OUT_NAME="${SRC_BIN}-${TAG}-${SUFFIX}"
            cp "target/${{ matrix.target }}/release/${SRC_BIN}" "dist/${OUT_NAME}"
            (cd dist && sha256sum "${OUT_NAME}" > "${OUT_NAME}.sha256")
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd dist
          TAG="${GITHUB_REF_NAME}"
          SUFFIX="${{ matrix.suffix }}"
          for SRC_BIN in open-pincery pcy; do
            BIN="${SRC_BIN}-${TAG}-${SUFFIX}"
            cosign sign-blob \
              --output-signature "${BIN}.sig" \
              --output-certificate "${BIN}.pem" \
              "${BIN}"
          done

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            dist/open-pincery-${{ github.ref_name }}-${{ matrix.suffix }}
            dist/open-pincery-${{ github.ref_name }}-${{ matrix.suffix }}.sha256
            dist/open-pincery-${{ github.ref_name }}-${{ matrix.suffix }}.sig
            dist/open-pincery-${{ github.ref_name }}-${{ matrix.suffix }}.pem
            dist/pcy-${{ github.ref_name }}-${{ matrix.suffix }}
            dist/pcy-${{ github.ref_name }}-${{ matrix.suffix }}.sha256
            dist/pcy-${{ github.ref_name }}-${{ matrix.suffix }}.sig
            dist/pcy-${{ github.ref_name }}-${{ matrix.suffix }}.pem
          if-no-files-found: error
          retention-days: 7

  sbom:
    name: generate-sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: sbom

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7

      - name: Generate SBOM
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          cargo cyclonedx --format json --override-filename "open-pincery-${TAG}-sbom"
          mkdir -p dist
          mv open-pincery-${TAG}-sbom.cdx.json "dist/open-pincery-${TAG}-sbom.cdx.json"
          (cd dist && sha256sum "open-pincery-${TAG}-sbom.cdx.json" > "open-pincery-${TAG}-sbom.cdx.json.sha256")

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd dist
          SBOM="open-pincery-${GITHUB_REF_NAME}-sbom.cdx.json"
          cosign sign-blob \
            --output-signature "${SBOM}.sig" \
            --output-certificate "${SBOM}.pem" \
            "${SBOM}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dist/open-pincery-${{ github.ref_name }}-sbom.cdx.json*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish-release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
