# cargo-deny configuration for Open Pincery.
# Run locally with `cargo deny check` (install via `cargo install cargo-deny`).

[graph]
all-features = false
no-default-features = false

[advisories]
# AC-37 (v6): zero-advisory floor. Version 2 of the advisories config
# implicitly denies known vulnerabilities; we additionally refuse yanked
# crates. The ignore list is intentionally narrow and every entry must
# carry (a) the advisory ID, (b) a dated justification, and (c) the
# revisit trigger. Adding any entry beyond a dated, justified exception
# is a STOP-and-raise event, not a normal maintenance step.
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 — Marvin attack on `rsa` 0.9.x (medium, 5.9).
    # Pulled transitively through `sqlx-macros-core -> sqlx-mysql -> rsa`.
    # The sqlx macro crate unconditionally compiles sqlx-mysql at
    # macro-expand time regardless of which database features we enable,
    # so this path is not reachable at runtime (we only connect to
    # Postgres). No upstream `rsa` fix has shipped since the 2023-11-22
    # advisory, and sqlx-macros does not offer a flag to exclude mysql.
    # Revisit whenever: (a) `rsa` publishes a fixed release, (b) sqlx
    # 0.9+ ships with a non-mysql-bearing macros crate, or (c) we move
    # off the `sqlx::FromRow` derive entirely.
    { id = "RUSTSEC-2023-0071", reason = "rsa via sqlx-macros-core->sqlx-mysql; no Postgres runtime exposure; no upstream fix. Revisit on rsa release or sqlx 0.9." },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
