# cargo-deny configuration for Open Pincery.
# Run locally with `cargo deny check` (install via `cargo install cargo-deny`).

[graph]
all-features = false
no-default-features = false

[advisories]
# AC-37 (v6): zero-advisory floor. Version 2 of the advisories config
# implicitly denies known vulnerabilities; we additionally refuse yanked
# crates. The ignore list is intentionally narrow and every entry must
# carry (a) the advisory ID, (b) a dated justification, and (c) the
# revisit trigger. Adding any entry beyond a dated, justified exception
# is a STOP-and-raise event, not a normal maintenance step.
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2024-0370 — `proc-macro-error` 1.0.4 is unmaintained.
    # Pulled transitively through `tabled_derive v0.7 -> tabled v0.15`,
    # which we use only in the CLI table renderer (`src/cli/output.rs`).
    # `proc-macro-error` is a build-time proc-macro helper crate: it
    # runs inside rustc during `cargo build` and contributes zero bytes
    # to the runtime binary. No known exploit; the advisory is a
    # maintenance flag, not a vulnerability. A safe upgrade requires
    # bumping `tabled` to 0.20 (breaking API changes across Table /
    # TableIteratorExt / settings), which is scoped out of the v9
    # security push and tracked as a separate maintenance task.
    # Revisit whenever: (a) `tabled` 0.20 migration lands, or
    # (b) `proc-macro-error2` is adopted upstream by `tabled_derive`.
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error is build-time only (proc-macro expansion); no runtime exposure. Upgrade path = tabled 0.20 migration, tracked separately." },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
