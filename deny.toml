# cargo-deny configuration for Open Pincery.
# Run locally with `cargo deny check` (install via `cargo install cargo-deny`).

[graph]
all-features = false
no-default-features = false

[advisories]
# AC-37 (v6): zero-advisory floor. Version 2 of the advisories config
# implicitly denies known vulnerabilities; we additionally refuse yanked
# crates and keep the ignore list empty so any new RUSTSEC advisory fails
# CI. Reinstating an ignore entry is a STOP-and-raise event, not a normal
# maintenance step.
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
